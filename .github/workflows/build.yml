name: Build Trinity Control
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: Trinity-Control-Alpha-2-macOS
          path: dist/*.dmg
          if-no-files-found: error
